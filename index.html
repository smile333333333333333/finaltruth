<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Recovered Recording</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- CRT Glow -->

<div id="crt"></div>

<!-- Scanlines -->

<div id="scanlines"></div>

<!-- Static -->

<div id="static"></div>

<!-- Flash -->

<div id="flash"></div>

<!-- Main Container -->

<div id="container">

<div id="screen">

<pre id="text"></pre>

</div>

</div>

<!-- Hidden Easter Egg -->

<div id="secret">

RE WAS CORRECT.

</div>

<!-- Audio -->

<audio
id="typingSound"
preload="auto">
<source src="sounds/typing.wav">
</audio>

<audio
id="glitchSound"
preload="auto">
<source src="sounds/glitch.wav">
</audio>

<audio
id="hum"
loop
autoplay>
<source src="sounds/hum.mp3">
</audio>

<script src="script.js"></script>

</body>

</html>
